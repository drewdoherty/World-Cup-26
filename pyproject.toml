[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "wca"
version = "0.1.0"
description = "World Cup Alpha - quantitative betting research platform for the 2026 FIFA World Cup"
requires-python = ">=3.9"
dependencies = ["numpy", "scipy", "pandas", "requests", "matplotlib"]

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
