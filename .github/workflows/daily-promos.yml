name: Daily Promo Sweep

on:
  schedule:
    # ~8:47 AM UTC — 30 min after the daily card (08:17) so the model scores
    # feed (site/scores_data.json) is fresh when boosts are priced. Offset
    # minute so it never shares a trigger minute with the card or hourly jobs.
    - cron: '47 8 * * *'
  workflow_dispatch:  # Allow manual trigger

# Serialize with the card / hourly jobs — all commit site data to main.
concurrency:
  group: site-data-push
  cancel-in-progress: false

jobs:
  promo-sweep:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # HONEST CAVEAT: this CI runner has a US IP and a throwaway, gitignored
      # data/wca.db, so:
      #   * more book hubs Cloudflare/geo-block here than on a local (UK/Bahrain)
      #     run — 'blocked'/'empty' rows in scrape_health are expected;
      #   * the DB does NOT persist between runs, so there is no cross-day
      #     new/changed/removed diff and no de-duplicated Telegram ping here.
      # The stateful daemon (cross-day diffs + +EV boost pings) is meant to run
      # LOCALLY: `python scripts/wca_promosd.py` (loop) against the persistent
      # local DB. This CI job just refreshes the PUBLISHED catalog daily:
      # re-seed from docs/recon/uk_books.md + one best-effort live scrape.
      - name: Sweep promotions (seed + best-effort scrape, price scraped boosts)
        env:
          # Optional — the daemon skips Telegram cleanly if these are unset.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WCA_NEWS_CHAT_ID: ${{ secrets.WCA_NEWS_CHAT_ID }}
        run: |
          mkdir -p logs
          python scripts/wca_promosd.py --once >> logs/promos.log 2>&1 || true

      - name: Regenerate promos site feed
        run: |
          python scripts/wca_promos_data.py >> logs/promos.log 2>&1

      # site/promos_data.json is a generated feed and is no longer committed to
      # git (feeds are built at serve time and rsynced to consumers — see
      # docs/data-and-artifacts.md). The regeneration step above still runs as a
      # generator smoke-check. If a cloud→serve transport is later needed, publish
      # the feed here to object storage instead of committing it to main.
