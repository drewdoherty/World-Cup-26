name: pytest

# Test gate: runs the full pytest suite on every PR to main and on pushes to
# main. Make this a required status check in branch protection so red can never
# land silently again (there was previously only a Vercel preview check;
# Vercel itself was removed entirely on 2026-07-08).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: pytest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.9'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Pinned runtime deps first so their exact versions win, then the
          # package itself (editable) plus the pinned test extras (pytest,
          # eth-account, matplotlib). Editable install puts `wca` on the path
          # so no PYTHONPATH juggling is needed.
          pip install -r requirements.txt
          pip install -e .[dev]

      - name: Run tests
        run: pytest -q
