name: Hourly Odds Snapshot

on:
  schedule:
    # Every hour at minute 0 (sync at the top of each hour)
    - cron: '0 * * * *'
  workflow_dispatch:

# Serialize with the daily card job — both commit site data to main.
concurrency:
  group: site-data-push
  cancel-in-progress: false

jobs:
  snapshot-odds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Keep the scores & markets tab fresh between daily card builds: live
      # venue prices move hourly even though the model side only changes when
      # the card is rebuilt. Runs BEFORE the snapshot ingest, which is known
      # to be fragile on a DB-less runner.
      - name: Refresh scores feed
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          BETFAIR_USERNAME: ${{ secrets.BETFAIR_USERNAME }}
          BETFAIR_PASSWORD: ${{ secrets.BETFAIR_PASSWORD }}
          BETFAIR_APP_KEY: ${{ secrets.BETFAIR_APP_KEY }}
          BETFAIR_APP_KEY_LIVE: ${{ secrets.BETFAIR_APP_KEY_LIVE }}
          BETFAIR_APP_KEY_DELAYED: ${{ secrets.BETFAIR_APP_KEY_DELAYED }}
          BETFAIR_APP_KEY_PREFER: delayed
          WCA_ODDS_MERGE: bestprice
          PYTHONPATH: src
        run: |
          mkdir -p logs
          # Run with explicit exit-code check so failures appear red in CI.
          # `|| true` was hiding silent crashes (bad API key / no upcoming events),
          # which caused `git diff --cached --quiet` to be true → no commit at all.
          if python scripts/wca_scores_data.py --hours-ahead 96 >> logs/scores.log 2>&1; then
            echo "scores: OK"
          else
            echo "WARN: wca_scores_data.py failed (see logs) — touching file to stamp the run" | tee -a logs/scores.log
            # Always update the generation timestamp so there is a diff to commit,
            # making the staleness visible on the site rather than silently serving
            # a file from hours ago. (One-line -c: a column-0 heredoc body breaks
            # the YAML block scalar and fails the whole workflow at startup.)
            python -c "import json,datetime,os; p='site/scores_data.json'; d=(json.load(open(p)) if os.path.exists(p) else {'fixtures':[]}); m=d.setdefault('meta',{}); m['generated']=datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC'); m['error']='wca_scores_data.py failed - no new fixtures fetched'; json.dump(d,open(p,'w'),indent=2); print('Stamped',p)"
          fi
          # Enhanced Scores & Markets panel: model scorelines for every upcoming
          # current+next-stage game, pivotable by stage/team. Reuses the committed
          # advancement_data.json for the advancement side.
          python scripts/wca_scores_markets_data.py >> logs/scores.log 2>&1 || true

      # The runner has no ledger DB (gitignored), so the SQLite side goes to a
      # throwaway file. The raw JSON dump lands in data/raw/snapshots/ (untracked;
      # re-downloadable — mirror off-repo per docs/data-and-artifacts.md). On a CI
      # runner this is ephemeral; durable snapshot capture happens on the mini.
      - name: Ingest odds snapshot
        continue-on-error: true  # a transient API failure must not block the scores commit
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: src
        run: |
          python scripts/wca_snapshot_odds.py >> logs/odds.log 2>&1

      # site/scores_data.json + site/scores_markets.json (generated feeds) and
      # data/raw/snapshots (raw odds dumps) are no longer committed to git — feeds
      # are built at serve time and rsynced to consumers; snapshots are mirrored
      # off-repo (see docs/data-and-artifacts.md). The regenerate/ingest steps
      # above still run as smoke-checks; nothing is committed from this job now.
      - name: Note — feeds and snapshots are not committed
        run: |
          echo "site/*.json feeds + data/raw/snapshots are artifacts; not tracked."
