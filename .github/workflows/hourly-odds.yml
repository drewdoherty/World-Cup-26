name: Hourly Odds Snapshot

on:
  schedule:
    # Every hour at minute 0 (sync at the top of each hour)
    - cron: '0 * * * *'
  workflow_dispatch:

# Serialize with the daily card job — both commit site data to main.
concurrency:
  group: site-data-push
  cancel-in-progress: false

jobs:
  snapshot-odds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Keep the scores & markets tab fresh between daily card builds: live
      # venue prices move hourly even though the model side only changes when
      # the card is rebuilt. Runs BEFORE the snapshot ingest, which is known
      # to be fragile on a DB-less runner.
      - name: Refresh scores feed
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          mkdir -p logs
          python scripts/wca_scores_data.py --hours-ahead 48 >> logs/scores.log 2>&1 || true
          # Enhanced Scores & Markets panel: model scorelines for every upcoming
          # current+next-stage game, pivotable by stage/team. Reuses the committed
          # advancement_data.json for the advancement side.
          python scripts/wca_scores_markets_data.py >> logs/scores.log 2>&1 || true

      # The runner has no ledger DB (gitignored), so the SQLite side goes to
      # a throwaway file — the durable output is the raw JSON dump in
      # data/raw/snapshots/ (git-tracked; feeds linemove's event metadata).
      - name: Ingest odds snapshot
        continue-on-error: true  # a transient API failure must not block the scores commit
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python scripts/wca_snapshot_odds.py >> logs/odds.log 2>&1

      - name: Commit refreshed feeds
        run: |
          git config user.email "bot@world-cup-alpha.local"
          git config user.name "World Cup Alpha Bot"
          git add site/scores_data.json site/scores_markets.json data/raw/snapshots
          git diff --cached --quiet || git commit -m "Auto-sync: hourly scores feed + odds snapshot"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push origin main && break
            sleep $((i * 10))
          done
