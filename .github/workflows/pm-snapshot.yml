name: PM Price History Snapshot

# Capture a Polymarket price snapshot every hour so outright/advancement markets
# accrue a price TRAJECTORY (the only leading edge signal where CLV can't exist).
# Reuses the advancement feed's existing model-vs-PM pairing -> no extra PM calls.
# Mini-independent: runs in the cloud so history accrues even when the mini sleeps.
# Writes only to data/ (the JSONL dataset), so the site Vercel ignoreCommand keeps
# deploys scoped (no site rebuild from a price-history commit).
on:
  schedule:
    - cron: '37 * * * *'   # hourly at :37 (offset from odds :00 and card :17)
  workflow_dispatch:

concurrency:
  group: pm-price-history
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh advancement feed (model + PM pairing)
        run: |
          mkdir -p logs data
          # Best-effort: rebuild advancement so the snapshot reflects current PM.
          # If it fails (e.g. PM pairing hiccup) we still snapshot the committed feed.
          PYTHONPATH=src python scripts/wca_advancement_data.py >> logs/pm_snapshot.log 2>&1 || true

      - name: Append PM price snapshot
        run: |
          PYTHONPATH=src python scripts/wca_pm_snapshot.py \
            --adv site/advancement_data.json \
            --jsonl data/pm_price_history.jsonl >> logs/pm_snapshot.log 2>&1

      - name: Commit price-history dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pm_price_history.jsonl
          git diff --cached --quiet || git commit -m "data: hourly PM price-history snapshot"
          git push || true
