name: Daily Card Generation

on:
  # Automated daily card generation is now handled by the Mac Mini's
  # com.wca.build_card service (hourly), which is more reliable and keeps
  # the card fresher. The schedule trigger below is disabled; use workflow_dispatch
  # manually if needed, or run: bash deploy/install_services.sh on the Mac Mini.
  # schedule:
  #   - cron: '17 8 * * *'
  workflow_dispatch:  # Allow manual trigger if needed

# Serialize with the hourly job — both commit site data to main.
concurrency:
  group: site-data-push
  cancel-in-progress: false

jobs:
  build-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh cleaned results dataset
        run: |
          mkdir -p logs
          # Rebuild martj42_cleaned.csv from the latest raw mirror + verified
          # corrections so the card fits on accurate, current fixtures.
          python scripts/wca_clean_results.py --days 14 --force-download \
            >> logs/clean_results.log 2>&1 || \
            echo "WARN: clean step degraded; card will use last good cleaned data"

      - name: Generate matchday card
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          mkdir -p logs
          python scripts/wca_build_card.py --hours-ahead 96 >> logs/card.log 2>&1

      - name: Regenerate site data
        # The CI runner has no ledger DB (data/wca.db is gitignored), so
        # build_site_data returns empty GBP positions and would clobber the
        # mini's canonical site/data.json that holds the real sportsbook book.
        # Skip entirely — the Mac Mini's com.wca.build_card service owns this
        # file and pushes it to main with the full ledger.
        run: |
          if [ -f data/wca.db ]; then
            python scripts/wca_site.py >> logs/site.log 2>&1
          else
            echo "SKIP: no data/wca.db on CI runner — site/data.json preserved (mini owns it)"
          fi

      - name: Regenerate scores feed
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python scripts/wca_scores_data.py --hours-ahead 96 >> logs/scores.log 2>&1 || true

      # NOTE: the prediction-tracking feed (site/tracking_data.json) is NOT
      # rebuilt here on purpose — it needs the ledger DB and full git history,
      # neither of which exists on a CI runner. It is generated locally
      # (wca_tracking_data.py) and the script refuses degraded overwrites.

      - name: Commit changes
        run: |
          git config user.email "bot@world-cup-alpha.local"
          git config user.name "World Cup Alpha Bot"
          git add data/card_latest.md data/model_predictions.json data/model_predictions_log.jsonl \
                  data/raw/martj42_cleaned.csv \
                  data/corrections.json data/corrections_review.json data/audit.json \
                  site/data.json site/linemove.json site/scores_data.json
          git commit -m "Auto-sync: daily card + site data" || true
          # Retry around concurrent pushes (local daemons also push to main).
          # '-X theirs' keeps the freshly regenerated local copy for the
          # wholesale-rewritten site feeds.
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push origin main && break
            sleep $((i * 10))
          done
