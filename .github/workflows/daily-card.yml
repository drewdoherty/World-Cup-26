name: Daily Card Generation

on:
  # Mini-INDEPENDENT freshness: build the command caches (card/next/goalscorers/
  # predictions/scores) in the cloud every hour so /card, /next, /goalscorers and
  # /accas stay fresh even when the Mac Mini is asleep or its repo is wedged. The
  # mini then just autopulls + serves. Polymarket is the always-on floor (no
  # creds); Betfair/TheOddsAPI best-price activate automatically once their
  # secrets are present in the repo's Actions secret store.
  # PAUSED 2026-07-19: Actions runs are instant-failing repo-wide (no runner
  # ever assigned, 2s to failure) — looks like an Actions minutes/spending
  # limit hit. Re-enable the schedule block below once billing is confirmed
  # clear. workflow_dispatch still works for manual runs.
  # schedule:
  #   - cron: '17 * * * *'   # hourly at :17 (offset from the :00 odds snapshot)
  workflow_dispatch:  # Allow manual trigger too

# Serialize with the hourly job — both commit site data to main.
concurrency:
  group: site-data-push
  cancel-in-progress: false

jobs:
  build-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh cleaned results dataset
        run: |
          mkdir -p logs
          # Rebuild martj42_cleaned.csv from the latest raw mirror + verified
          # corrections so the card fits on accurate, current fixtures.
          python scripts/wca_clean_results.py --days 14 --force-download \
            >> logs/clean_results.log 2>&1 || \
            echo "WARN: clean step degraded; card will use last good cleaned data"

      - name: Generate matchday card
        env:
          # Best-price line-shop across venues. Polymarket is the always-on floor
          # (no creds); Betfair Exchange + TheOddsAPI books join the comparison
          # automatically when these secrets are configured (empty = degrade).
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          BETFAIR_USERNAME: ${{ secrets.BETFAIR_USERNAME }}
          BETFAIR_PASSWORD: ${{ secrets.BETFAIR_PASSWORD }}
          BETFAIR_APP_KEY: ${{ secrets.BETFAIR_APP_KEY }}
          BETFAIR_APP_KEY_LIVE: ${{ secrets.BETFAIR_APP_KEY_LIVE }}
          BETFAIR_APP_KEY_DELAYED: ${{ secrets.BETFAIR_APP_KEY_DELAYED }}
          BETFAIR_APP_KEY_PREFER: delayed
          WCA_ODDS_MERGE: bestprice
          PYTHONPATH: src
        run: |
          mkdir -p logs
          # --bankroll 2000 = the current CLV ladder rung (no ledger DB on the CI
          # runner); the mini's build overwrites with ledger-resolved sizing when
          # it next runs. Picks/edges/best-price are bankroll-independent.
          python scripts/wca_build_card.py --hours-ahead 96 --bankroll 2000 >> logs/card.log 2>&1 \
            || { echo "card build failed; tail:"; tail -30 logs/card.log; exit 1; }

      - name: Regenerate site data
        env:
          PYTHONPATH: src
        # The CI runner has no ledger DB (data/wca.db is gitignored), so
        # build_site_data returns empty GBP positions and would clobber the
        # mini's canonical site/data.json that holds the real sportsbook book.
        # Skip entirely — the Mac Mini's com.wca.build_card service owns this
        # file and pushes it to main with the full ledger.
        run: |
          if [ -f data/wca.db ]; then
            python scripts/wca_site.py >> logs/site.log 2>&1
          else
            echo "SKIP: no data/wca.db on CI runner — site/data.json preserved (mini owns it)"
          fi

      - name: Regenerate scores feed
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          BETFAIR_USERNAME: ${{ secrets.BETFAIR_USERNAME }}
          BETFAIR_PASSWORD: ${{ secrets.BETFAIR_PASSWORD }}
          BETFAIR_APP_KEY: ${{ secrets.BETFAIR_APP_KEY }}
          BETFAIR_APP_KEY_LIVE: ${{ secrets.BETFAIR_APP_KEY_LIVE }}
          BETFAIR_APP_KEY_DELAYED: ${{ secrets.BETFAIR_APP_KEY_DELAYED }}
          BETFAIR_APP_KEY_PREFER: delayed
          WCA_ODDS_MERGE: bestprice
          PYTHONPATH: src
        run: |
          python scripts/wca_scores_data.py --hours-ahead 96 >> logs/scores.log 2>&1 || true
          # Event Markets forest feed (site/forest_data.json): rebuilt with the
          # card so the model side of the dot-plot matches the freshly built
          # scorelines/1X2. Best-effort; never blocks the run.
          python scripts/wca_forest_data.py --hours-ahead 96 >> logs/scores.log 2>&1 || true

      # NOTE: the prediction-tracking feed (site/tracking_data.json) is NOT
      # rebuilt here on purpose — it needs the ledger DB and full git history,
      # neither of which exists on a CI runner. It is generated locally
      # (wca_tracking_data.py) and the script refuses degraded overwrites.

      - name: Regenerate Action Desk feed (bet_recs.json)
        env:
          PYTHONPATH: src
        run: |
          # wca_betrecs.py reads only cached feeds — no live Odds API pull.
          # No ledger DB on CI: falls back to rung-0 sportsbook pool defaults.
          python scripts/wca_betrecs.py >> logs/betrecs.log 2>&1 || true

      - name: Regenerate benchmarks feed (benchmarks_data.json)
        env:
          PYTHONPATH: src
        # Pure offline JSON join over data/model_predictions_log.jsonl (just
        # refreshed above by the card build) and data/processed/wc2026_results.json
        # (refreshed by the clean-results step) — no ledger DB or live odds pull
        # needed, so unlike site/data.json this is safe to build on CI too and
        # gives the mini's publish job a mini-independent backup, same rationale
        # as this workflow's other feeds. PREVIOUSLY wired into NO cron/CI/launchd
        # job at all (found 2026-07 audit); site/benchmarks_data.json was a
        # one-off hand-authored snapshot from 2026-06-27.
        run: |
          python scripts/build_benchmarks.py >> logs/benchmarks.log 2>&1 || true

      - name: Commit changes
        run: |
          git config user.email "bot@world-cup-alpha.local"
          git config user.name "World Cup Alpha Bot"
          git add data/card_latest.md data/next_latest.md data/goalscorers_latest.md \
                  data/model_predictions.json data/model_predictions_log.jsonl \
                  data/raw/martj42_cleaned.csv \
                  data/corrections.json data/corrections_review.json data/audit.json \
                  site/data.json site/linemove.json site/scores_data.json site/forest_data.json site/bet_recs.json \
                  site/benchmarks_data.json
          git commit -m "Auto-sync: daily card + site data" || true
          # Retry around concurrent pushes (local daemons also push to main).
          # '-X theirs' keeps the freshly regenerated local copy for the
          # wholesale-rewritten site feeds.
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push origin main && break
            sleep $((i * 10))
          done
