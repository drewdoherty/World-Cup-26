<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta name="color-scheme" content="light">
<title>WORLD CUP ALPHA // BETS</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="app">
  <!-- Ticker bar -->
  <header class="ticker" id="ticker">
    <div class="brand">
      <span class="brand-mark">WCA</span>
      <span class="brand-sub">WORLD CUP ALPHA</span>
    </div>
    <nav class="scores-nav">
      <span class="scores-nav-here">Bets</span>
      <a class="scores-nav-link" href="./scores.html">Scores &amp; Markets</a>
      <a class="scores-nav-link" href="./forest.html">Event Markets</a>
      <a class="scores-nav-link" href="./architecture.html">Under The Hood</a>
      <a class="scores-nav-link" href="./promos.html">Promos &amp; Offers</a>
      <a class="scores-nav-link" href="./arb.html">Bet Recs</a>
      <a class="scores-nav-link" href="./microstructure.html">Microstructure</a>
      <a class="scores-nav-link" href="./benchmarks.html">Benchmarks</a>
    </nav>
    <div class="ticker-stats" id="ticker-stats">
      <!-- ticker tiles injected here -->
    </div>
  </header>

  <!-- Connection / no-data banner -->
  <div class="nodata" id="nodata" hidden>
    <span class="nodata-dot"></span>
    <span id="nodata-msg">NO DATA FEED</span>
  </div>

  <main class="bets-main">
    <!-- Positions (full-width: dense table needs to breathe) -->
    <section class="panel panel-positions">
      <div class="panel-head">
        <span class="panel-label">🎯 Positions // Open</span>
        <div class="pos-toggle" id="pos-open-toggle">
          <button class="pos-tog active" data-panel="open" data-filter="all">All</button>
          <button class="pos-tog" data-panel="open" data-filter="today">Today</button>
        </div>
        <span class="panel-meta" id="positions-meta"></span>
      </div>
      <div class="panel-body panel-scroll" id="positions"></div>
    </section>

    <div class="bets-note">
      Analytics — venues, scoreline predictions, closed P&amp;L, charts, exposure
      and prediction tracking — now live on
      <a href="./architecture.html">Under The Hood</a>.
    </div>
  </main>

  <footer class="foot">
    <span class="foot-gen" id="foot-gen"></span>
    <span class="foot-mark">WORLD CUP ALPHA</span>
  </footer>
</div>
<script src="./app.js"></script>
</body>
</html>
